name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller ^
            --clean ^
            --onefile ^
            --noconsole ^
            --name="ShScriptHub-${{ github.ref_name }}" ^
            --icon=assets/icon.ico ^
            --add-data "assets;assets" ^
            --distpath release ^
            --workpath build ^
            --specpath release ^
            src/main.py

      - name: Prepare package
        run: |
          mkdir package
          copy release\ShScriptHub-*.exe package\
          copy README.md package\

      - name: Create ZIP
        run: |
          powershell Compress-Archive -Path package\* -DestinationPath ShScriptHub-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ShScriptHub - ${{ github.ref_name }}
          files: |
            release/ShScriptHub-${{ github.ref_name }}.exe
            ShScriptHub-${{ github.ref_name }}.zip